name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main # Altere se sua branch principal for outra

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login no Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build e Push da Imagem Docker
        run: |
          docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/code-ascension:${{ github.sha }} .
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/code-ascension:${{ github.sha }}

      - name: Deploy no Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          app-name: code-ascention
          resource-group: code-ascension-group
          image-to-deploy: ${{ secrets.REGISTRY_LOGIN_SERVER }}/code-ascension:${{ github.sha }}