name: Trigger auto deployment for code-ascention

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/code-ascention-AutoDeployTrigger-0aabb6c1-781a-4bb8-8335-7e378bd59ef9.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CODEASCENTION_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CODEASCENTION_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CODEASCENTION_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: codeascentionregistry-ckggdzeychbgf8eq.azurecr.io
          registryUsername: ${{ secrets.CODEASCENTION_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CODEASCENTION_REGISTRY_PASSWORD }}
          containerAppName: code-ascention
          resourceGroup: code-ascension-group
          imageToBuild: codeascentionregistry-ckggdzeychbgf8eq.azurecr.io/code-ascention:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


